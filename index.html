<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0d0d14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>LeetTrack — SM-2 Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d14;
  --bg2: #13131f;
  --bg3: #1a1a2b;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f8;
  --muted: #7070a0;
  --accent: #7c6af7;
  --accent2: #a599ff;
  --green: #3ecf8e;
  --amber: #f59e0b;
  --red: #f87171;
  --blue: #60a5fa;
  --mono: 'DM Mono', monospace;
  --sans: 'Syne', sans-serif;
  --radius: 14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-tap-highlight-color: transparent; }

/* App shell */
#app { display: flex; flex-direction: column; height: 100dvh; max-width: 430px; margin: 0 auto; position: relative; }

/* Header */
.hdr { padding: 18px 20px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
.hdr-title { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
.hdr-title span { color: var(--accent); }
.streak-badge { display: flex; align-items: center; gap: 5px; background: rgba(124,106,247,0.15); border: 1px solid rgba(124,106,247,0.3); border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 600; color: var(--accent2); font-family: var(--mono); }

/* Nav */
.nav { display: flex; border-top: 1px solid var(--border); padding-bottom: var(--safe-bottom); background: var(--bg); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0; font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 0.04em; cursor: pointer; transition: color 0.15s; border: none; background: none; }
.nav-btn.active { color: var(--accent2); }
.nav-btn svg { width: 20px; height: 20px; }

/* Scrollable content */
.content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
.page { display: none; padding: 16px 20px 24px; }
.page.active { display: block; }

/* Today page */
.today-header { margin-bottom: 20px; }
.date-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
.today-title { font-size: 26px; font-weight: 800; letter-spacing: -1px; }

/* Stat row */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.stat-val { font-size: 22px; font-weight: 800; letter-spacing: -1px; }
.stat-lbl { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: 0.06em; margin-top: 2px; }
.val-green { color: var(--green); }
.val-amber { color: var(--amber); }
.val-red   { color: var(--red); }
.val-acc   { color: var(--accent2); }

/* Section head */
.sec-hdr { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

/* Review card */
.q-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; position: relative; overflow: hidden; transition: border-color 0.15s; }
.q-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; }
.q-card.easy::before { background: var(--green); }
.q-card.medium::before { background: var(--amber); }
.q-card.hard::before { background: var(--red); }
.q-card.done { opacity: 0.45; }
.q-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.q-num { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.q-title { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; flex: 1; }
.q-badges { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
.badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 6px; letter-spacing: 0.03em; }
.badge-easy   { background: rgba(62,207,142,0.12); color: var(--green); }
.badge-medium { background: rgba(245,158,11,0.12); color: var(--amber); }
.badge-hard   { background: rgba(248,113,113,0.12); color: var(--red); }
.badge-topic  { background: rgba(124,106,247,0.12); color: var(--accent2); }
.badge-new    { background: rgba(96,165,250,0.12); color: var(--blue); }
.badge-rev    { background: rgba(124,106,247,0.12); color: var(--accent2); }
.q-card-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
.ef-bar-wrap { flex: 1; margin-right: 12px; }
.ef-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; font-family: var(--mono); }
.ef-bar { height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.ef-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s; }

/* Rating buttons */
.rate-row { display: flex; gap: 6px; margin-top: 10px; }
.rate-btn { flex: 1; padding: 7px 0; border: 1px solid var(--border2); border-radius: 8px; background: var(--bg3); font-size: 12px; font-weight: 700; font-family: var(--mono); cursor: pointer; transition: all 0.12s; color: var(--text); }
.rate-btn:hover { border-color: var(--accent); color: var(--accent2); background: rgba(124,106,247,0.1); }
.rate-btn.r1 { color: var(--red); }
.rate-btn.r2 { color: #fb923c; }
.rate-btn.r3 { color: var(--amber); }
.rate-btn.r4 { color: #a3e635; }
.rate-btn.r5 { color: var(--green); }

/* Add question page */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.form-input, .form-select { width: 100%; background: var(--bg2); border: 1px solid var(--border2); border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: var(--sans); color: var(--text); outline: none; transition: border-color 0.15s; }
.form-input:focus, .form-select:focus { border-color: var(--accent); }
.form-select { appearance: none; }
.diff-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.diff-opt { border: 1px solid var(--border2); border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 700; transition: all 0.12s; }
.diff-opt.sel-easy   { background: rgba(62,207,142,0.12); border-color: var(--green); color: var(--green); }
.diff-opt.sel-medium { background: rgba(245,158,11,0.12); border-color: var(--amber); color: var(--amber); }
.diff-opt.sel-hard   { background: rgba(248,113,113,0.12); border-color: var(--red); color: var(--red); }
.diff-opt.unsel { color: var(--muted); }
.btn-primary { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; font-size: 15px; font-weight: 800; font-family: var(--sans); color: #fff; cursor: pointer; transition: all 0.12s; letter-spacing: -0.3px; margin-top: 4px; }
.btn-primary:hover { background: var(--accent2); }
.btn-primary:active { transform: scale(0.98); }

/* Progress page */
.prog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.prog-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.prog-card .big { font-size: 32px; font-weight: 800; letter-spacing: -2px; }
.prog-card .lbl { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.06em; margin-top: 3px; }

/* Topic breakdown */
.topic-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.topic-name { font-size: 13px; font-weight: 600; flex: 1; }
.topic-bar-wrap { width: 80px; }
.topic-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.topic-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }
.topic-count { font-family: var(--mono); font-size: 11px; color: var(--muted); min-width: 28px; text-align: right; }

/* Schedule page */
.sched-day { margin-bottom: 14px; }
.sched-day-hdr { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; display: flex; gap: 8px; align-items: center; }
.day-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.sched-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.sched-chip { font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 20px; font-family: var(--mono); }
.chip-new  { background: rgba(96,165,250,0.12); color: var(--blue); border: 1px solid rgba(96,165,250,0.2); }
.chip-rev  { background: rgba(124,106,247,0.12); color: var(--accent2); border: 1px solid rgba(124,106,247,0.2); }

/* Empty state */
.empty { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-icon { font-size: 36px; margin-bottom: 12px; }
.empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.empty-sub { font-size: 13px; line-height: 1.5; }

/* Toast */
.toast { position: fixed; bottom: calc(60px + var(--safe-bottom) + 12px); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; padding: 8px 16px; font-size: 12px; font-weight: 600; color: var(--text); opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 999; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Checkbox done */
.done-btn { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border2); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
.done-btn.checked { background: var(--green); border-color: var(--green); }
.done-btn svg { width: 12px; height: 12px; stroke: #fff; }
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-title">Leet<span>Track</span></div>
    <div class="streak-badge" id="streak-badge">🔥 <span id="streak-num">1</span> day</div>
  </div>

  <div class="content">
    <!-- TODAY page -->
    <div class="page active" id="page-today">
      <div class="today-header">
        <div class="date-label" id="today-date-label"></div>
        <div class="today-title" id="today-title">Today's Queue</div>
      </div>
      <div class="stats-row" id="stats-row"></div>
      <div class="sec-hdr">Due now <span id="due-count-lbl"></span></div>
      <div id="queue-list"></div>
    </div>

    <!-- SCHEDULE page -->
    <div class="page" id="page-sched">
      <div class="today-header">
        <div class="today-title">Schedule</div>
        <div class="date-label" style="margin-top:4px">Next 14 days — SM-2 generated</div>
      </div>
      <div id="sched-container"></div>
    </div>

    <!-- ADD page -->
    <div class="page" id="page-add">
      <div class="today-header">
        <div class="today-title">Add Question</div>
      </div>
      <div class="form-group">
        <div class="form-label">Question number</div>
        <input class="form-input" id="inp-num" type="number" placeholder="e.g. 236" min="1" max="9999">
      </div>
      <div class="form-group">
        <div class="form-label">Title</div>
        <input class="form-input" id="inp-title" type="text" placeholder="e.g. Lowest Common Ancestor">
      </div>
      <div class="form-group">
        <div class="form-label">Topic</div>
        <select class="form-select" id="inp-topic">
          <option>Tree</option><option>Graph</option><option>Array</option><option>HashMap</option>
          <option>Linked List</option><option>Dynamic Programming</option><option>Two Pointers</option>
          <option>BFS/DFS</option><option>Binary Search</option><option>Stack/Queue</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <div class="form-label">Difficulty</div>
        <div class="diff-row" id="diff-row">
          <div class="diff-opt sel-easy" data-diff="Easy" onclick="selectDiff(this)">Easy</div>
          <div class="diff-opt unsel" data-diff="Medium" onclick="selectDiff(this)">Medium</div>
          <div class="diff-opt unsel" data-diff="Hard" onclick="selectDiff(this)">Hard</div>
        </div>
      </div>
      <button class="btn-primary" onclick="addQuestion()">Add to queue →</button>
    </div>

    <!-- PROGRESS page -->
    <div class="page" id="page-prog">
      <div class="today-header">
        <div class="today-title">Progress</div>
      </div>
      <div class="prog-grid" id="prog-grid"></div>
      <div class="sec-hdr">By topic</div>
      <div id="topic-breakdown"></div>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="showPage('today',this)" id="nav-today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Today
    </button>
    <button class="nav-btn" onclick="showPage('sched',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      Schedule
    </button>
    <button class="nav-btn" onclick="showPage('add',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Add
    </button>
    <button class="nav-btn" onclick="showPage('prog',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Progress
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'leettrack_v1';
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let selectedDiff = 'Easy';
let state = loadState();

function defaultState() {
  const today = todayStr();
  return {
    questions: [
      { id: 1, num: 236, title: "Lowest Common Ancestor of BST", topic: "Tree", diff: "Medium", ef: 2.5, interval: 1, dueDate: today, sessions: [], addedDate: today },
      { id: 2, num: 102, title: "Level Order Traversal", topic: "Tree", diff: "Medium", ef: 2.5, interval: 1, dueDate: today, sessions: [], addedDate: today },
      { id: 3, num: 200, title: "Number of Islands", topic: "Graph", diff: "Medium", ef: 2.3, interval: 1, dueDate: today, sessions: [], addedDate: today },
      { id: 4, num: 1,   title: "Two Sum", topic: "HashMap", diff: "Easy", ef: 2.9, interval: 14, dueDate: addDays(today,10), sessions: [{date:addDays(today,-4),rating:5}], addedDate: addDays(today,-4) },
      { id: 5, num: 21,  title: "Merge Two Sorted Lists", topic: "Linked List", diff: "Easy", ef: 2.7, interval: 6, dueDate: addDays(today,2), sessions: [{date:addDays(today,-4),rating:4}], addedDate: addDays(today,-4) },
      { id: 6, num: 42,  title: "Trapping Rain Water", topic: "Two Pointers", diff: "Hard", ef: 2.1, interval: 1, dueDate: addDays(today,3), sessions: [], addedDate: addDays(today,-1) },
      { id: 7, num: 300, title: "Longest Increasing Subsequence", topic: "Dynamic Programming", diff: "Medium", ef: 2.5, interval: 1, dueDate: addDays(today,1), sessions: [], addedDate: addDays(today,-1) },
    ],
    nextId: 8,
    streak: 1,
    lastStudyDate: today,
    todayDone: [],
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : defaultState();
  } catch { return defaultState(); }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0,10);
}

function daysBetween(a, b) {
  return Math.round((new Date(b+'T00:00:00') - new Date(a+'T00:00:00')) / 86400000);
}

function sm2(ef, rating) {
  const newEf = Math.max(1.3, ef + 0.1 - (5 - rating) * (0.08 + (5 - rating) * 0.02));
  return Math.round(newEf * 100) / 100;
}

function nextInterval(interval, ef, rating) {
  if (rating < 3) return 1;
  if (interval <= 1) return 1;
  if (interval === 1) return 6;
  return Math.round(interval * ef);
}

function rateQuestion(id, rating) {
  const q = state.questions.find(x => x.id === id);
  if (!q) return;
  const today = todayStr();
  q.sessions.push({ date: today, rating });
  q.ef = sm2(q.ef, rating);
  q.interval = nextInterval(q.interval === 1 && q.sessions.length <= 1 ? 0 : q.interval, q.ef, rating);
  q.dueDate = addDays(today, q.interval);
  if (!state.todayDone.includes(id)) state.todayDone.push(id);
  state.streak = calcStreak();
  saveState();
  renderAll();
  showToast(rating >= 4 ? '✓ Nice! Next review in ' + q.interval + 'd' : rating >= 3 ? '✓ Logged. Review in ' + q.interval + 'd' : '↩ Flagged for tomorrow');
}

function calcStreak() {
  const today = todayStr();
  if (state.lastStudyDate === today) return state.streak;
  if (state.lastStudyDate === addDays(today, -1)) { state.lastStudyDate = today; return state.streak + 1; }
  state.lastStudyDate = today; return 1;
}

function dueToday() {
  const today = todayStr();
  return state.questions.filter(q => q.dueDate <= today);
}

function renderAll() {
  renderToday();
  renderSchedule();
  renderProgress();
  document.getElementById('streak-num').textContent = state.streak;
}

function renderToday() {
  const today = new Date();
  document.getElementById('today-date-label').textContent =
    DAYS[today.getDay()] + ', ' + MONTHS[today.getMonth()] + ' ' + today.getDate();

  const due = dueToday();
  const doneCnt = state.todayDone.filter(id => due.find(q=>q.id===id)).length;
  document.getElementById('due-count-lbl').textContent = due.length + ' questions';

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-val val-acc">${due.length}</div><div class="stat-lbl">Due Today</div></div>
    <div class="stat-card"><div class="stat-val val-green">${doneCnt}</div><div class="stat-lbl">Completed</div></div>
    <div class="stat-card"><div class="stat-val val-amber">${state.questions.length}</div><div class="stat-lbl">Total</div></div>
  `;

  const list = document.getElementById('queue-list');
  if (due.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🎉</div><div class="empty-title">All caught up!</div><div class="empty-sub">No reviews due. Check back tomorrow or add a new question.</div></div>`;
    return;
  }
  list.innerHTML = due.map(q => {
    const done = state.todayDone.includes(q.id);
    const isNew = q.sessions.length === 0;
    const efPct = Math.round(((q.ef - 1.3) / (4.0 - 1.3)) * 100);
    const diffCls = q.diff.toLowerCase();
    return `
    <div class="q-card ${diffCls} ${done ? 'done' : ''}" id="qc-${q.id}">
      <div class="q-card-top">
        <div>
          <div class="q-num">#${q.num}</div>
          <div class="q-title">${q.title}</div>
          <div class="q-badges">
            <span class="badge badge-${diffCls}">${q.diff}</span>
            <span class="badge badge-topic">${q.topic}</span>
            ${isNew ? '<span class="badge badge-new">New</span>' : '<span class="badge badge-rev">Review</span>'}
          </div>
        </div>
        <button class="done-btn ${done?'checked':''}" onclick="toggleDone(${q.id})">
          <svg viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="ef-bar-wrap" style="margin-top:10px">
        <div class="ef-label">Ease factor: ${q.ef.toFixed(2)}</div>
        <div class="ef-bar"><div class="ef-bar-fill" style="width:${efPct}%"></div></div>
      </div>
      ${!done ? `
      <div class="rate-row">
        <button class="rate-btn r1" onclick="rateQuestion(${q.id},1)">1<br><span style="font-size:9px;font-weight:400">Blank</span></button>
        <button class="rate-btn r2" onclick="rateQuestion(${q.id},2)">2<br><span style="font-size:9px;font-weight:400">Hard</span></button>
        <button class="rate-btn r3" onclick="rateQuestion(${q.id},3)">3<br><span style="font-size:9px;font-weight:400">OK</span></button>
        <button class="rate-btn r4" onclick="rateQuestion(${q.id},4)">4<br><span style="font-size:9px;font-weight:400">Good</span></button>
        <button class="rate-btn r5" onclick="rateQuestion(${q.id},5)">5<br><span style="font-size:9px;font-weight:400">Easy</span></button>
      </div>` : '<div style="font-size:12px;color:var(--green);font-weight:600;margin-top:8px">✓ Done for today</div>'}
    </div>`;
  }).join('');
}

function toggleDone(id) {
  if (state.todayDone.includes(id)) {
    state.todayDone = state.todayDone.filter(x => x !== id);
  } else {
    state.todayDone.push(id);
  }
  saveState(); renderAll();
}

function renderSchedule() {
  const today = todayStr();
  const container = document.getElementById('sched-container');
  const days = {};
  for (let d = 0; d <= 13; d++) {
    const ds = addDays(today, d);
    days[ds] = [];
  }
  state.questions.forEach(q => {
    if (days[q.dueDate] !== undefined) days[q.dueDate].push(q);
    const sim = simulateFuture(q, today, 14);
    sim.forEach(({date, rev}) => {
      if (date !== q.dueDate && days[date] !== undefined) days[date].push({...q, _simRev: true});
    });
  });

  const lines = Object.entries(days).map(([ds, qs]) => {
    const d = new Date(ds + 'T00:00:00');
    const label = ds === today ? 'Today' : ds === addDays(today,1) ? 'Tomorrow' : DAYS[d.getDay()] + ' ' + MONTHS[d.getMonth()] + ' ' + d.getDate();
    const unique = [...new Map(qs.map(q=>[q.id,q])).values()];
    if (unique.length === 0) return `<div class="sched-day"><div class="sched-day-hdr"><div class="day-dot" style="background:var(--bg3)"></div>${label}</div><div style="font-size:12px;color:var(--muted);padding-left:14px">Rest day</div></div>`;
    const chips = unique.map(q => {
      const isNew = q.sessions.length === 0;
      return `<span class="sched-chip ${isNew ? 'chip-new' : 'chip-rev'}">#${q.num}</span>`;
    }).join('');
    return `<div class="sched-day"><div class="sched-day-hdr"><div class="day-dot"></div>${label} <span style="color:var(--muted);font-size:10px">${unique.length} q</span></div><div class="sched-chips">${chips}</div></div>`;
  }).join('');
  container.innerHTML = lines;
}

function simulateFuture(q, fromDate, days) {
  let { ef, interval, dueDate } = {...q};
  const results = [];
  let cur = dueDate;
  for (let i = 0; i < 6; i++) {
    if (daysBetween(fromDate, cur) > days) break;
    results.push({ date: cur });
    const defRating = q.diff === 'Easy' ? 4 : q.diff === 'Medium' ? 3 : 2;
    ef = sm2(ef, defRating);
    interval = nextInterval(interval, ef, defRating);
    cur = addDays(cur, interval);
  }
  return results;
}

function renderProgress() {
  const qs = state.questions;
  const mastered = qs.filter(q => q.ef >= 2.8 && q.sessions.length >= 3).length;
  const needsRev  = qs.filter(q => q.ef < 2.0).length;
  const totalSess = qs.reduce((a,q) => a + q.sessions.length, 0);
  const avgEf     = qs.length ? (qs.reduce((a,q)=>a+q.ef,0)/qs.length).toFixed(2) : '—';

  document.getElementById('prog-grid').innerHTML = `
    <div class="prog-card"><div class="big val-acc">${qs.length}</div><div class="lbl">Questions</div></div>
    <div class="prog-card"><div class="big val-green">${mastered}</div><div class="lbl">Mastered</div></div>
    <div class="prog-card"><div class="big val-red">${needsRev}</div><div class="lbl">Needs work</div></div>
    <div class="prog-card"><div class="big val-amber">${totalSess}</div><div class="lbl">Reviews done</div></div>
  `;

  const topicMap = {};
  qs.forEach(q => {
    if (!topicMap[q.topic]) topicMap[q.topic] = { total: 0, mastered: 0 };
    topicMap[q.topic].total++;
    if (q.ef >= 2.8 && q.sessions.length >= 3) topicMap[q.topic].mastered++;
  });
  const maxT = Math.max(...Object.values(topicMap).map(t=>t.total));
  document.getElementById('topic-breakdown').innerHTML = Object.entries(topicMap).map(([name, t]) => `
    <div class="topic-row">
      <div class="topic-name">${name}</div>
      <div class="topic-bar-wrap"><div class="topic-bar"><div class="topic-bar-fill" style="width:${Math.round(t.total/maxT*100)}%"></div></div></div>
      <div class="topic-count">${t.mastered}/${t.total}</div>
    </div>`).join('');
}

function addQuestion() {
  const num   = parseInt(document.getElementById('inp-num').value);
  const title = document.getElementById('inp-title').value.trim();
  const topic = document.getElementById('inp-topic').value;
  if (!num || !title) { showToast('Please fill in Q# and title'); return; }
  if (state.questions.find(q=>q.num===num)) { showToast('Question #' + num + ' already exists'); return; }
  const today = todayStr();
  state.questions.push({ id: state.nextId++, num, title, topic, diff: selectedDiff, ef: 2.5, interval: 1, dueDate: today, sessions: [], addedDate: today });
  saveState(); renderAll();
  document.getElementById('inp-num').value = '';
  document.getElementById('inp-title').value = '';
  showPage('today', document.getElementById('nav-today'));
  showToast('#' + num + ' added — due today!');
}

function selectDiff(el) {
  selectedDiff = el.dataset.diff;
  document.querySelectorAll('.diff-opt').forEach(d => {
    const dc = d.dataset.diff.toLowerCase();
    d.className = 'diff-opt ' + (d === el ? 'sel-' + dc : 'unsel');
  });
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

renderAll();
</script>
</body>
</html>
